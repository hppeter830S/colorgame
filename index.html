<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu des Couleurs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1>🎨 Apprends les Couleurs Colors</h1>

    <section class="color-palette">
        <h3>Les couleurs à apprendre</h3>
        <div id="colorPalette"></div>
    </section>

    <div class="info">
        <p>Niveau : <span id="level">Facile</span></p>
        <p>Score : <span id="score">0</span></p>
    </div>

    <h2 id="question">Trouve : ...</h2>

    <div id="gameArea"></div>

    <p id="message"></p>

    <button onclick="startGame()">Recommencer</button>

</div>

<script src="script.js"></script>
</body>
</html>
